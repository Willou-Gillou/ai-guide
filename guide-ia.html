<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guide IA — Histoire à portée de main</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --parchment: #fdf6e3;
      --ink: #2c1a0e;
      --ink-light: #6b4c2a;
      --red: #c0392b;
      --blue: #1a5276;
      --gold: #d4ac0d;
      --card-bg: #fffdf7;
      --border: #d4c5a9;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #2c1a0e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

    .header { width: 100%; background: linear-gradient(135deg, #1a0a02, #3d1f08, #1a0a02); padding: 18px 20px 14px; text-align: center; border-bottom: 3px solid var(--gold); position: relative; }
    .header::after { content: '✦ ✦ ✦'; display: block; color: var(--gold); font-size: .65rem; letter-spacing: 6px; margin-top: 6px; opacity: .7; }
    .app-title { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 900; color: var(--gold); text-shadow: 0 2px 8px rgba(0,0,0,.5); }
    .app-sub { font-size: .78rem; color: #c8a96e; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .compass-wrap { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .compass { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,.08); border: 2px solid rgba(212,172,13,.5); display: flex; align-items: center; justify-content: center; }
    .needle { width: 3px; height: 26px; border-radius: 2px; background: linear-gradient(180deg, var(--red) 50%, #94a3b8 50%); transition: transform .4s ease; transform-origin: center; }
    .compass-label { font-size: 9px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }

    .container { width: min(96vw, 480px); padding: 0 0 40px; display: flex; flex-direction: column; gap: 12px; margin-top: 14px; }

    .card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 4px 16px rgba(0,0,0,.25); }
    .loc-bar { display: flex; align-items: center; gap: 10px; }
    .loc-info { flex: 1; }
    .loc-text { font-size: .82rem; font-weight: 700; color: var(--ink); }
    .loc-coords { font-size: .72rem; color: var(--ink-light); font-weight: 600; margin-top: 1px; }
    .dir-badge { display: none; align-items: center; gap: 4px; background: #eaf4fb; border: 1.5px solid #aed6f1; border-radius: 8px; padding: 4px 10px; font-size: .74rem; font-weight: 700; color: var(--blue); flex-shrink: 0; }

    .map-wrap { border-radius: var(--radius); overflow: hidden; border: 2px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,.35); }
    #map { width: 100%; height: 240px; }
    .map-legend { display: flex; gap: 16px; padding: 7px 14px; background: var(--parchment); border-top: 1px solid var(--border); }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: .72rem; font-weight: 700; color: var(--ink-light); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .dot-me { background: #1a5276; } .dot-site { background: #c0392b; }

    .apikey-section { border: 2px dashed var(--border); border-radius: var(--radius); padding: 12px 14px; background: var(--parchment); transition: border-color .2s, background .2s; }
    .apikey-section.saved { border-color: #a9dfbf; background: #f0fdf4; border-style: solid; }
    .apikey-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .apikey-label { font-size: .82rem; font-weight: 800; color: var(--ink); display: flex; align-items: center; gap: 6px; }
    .apikey-status { font-size: .72rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; background: #fef3c7; color: #92400e; }
    .apikey-status.ok { background: #dcfce7; color: #166534; }
    .apikey-body { display: none; margin-top: 10px; flex-direction: column; gap: 8px; }
    .apikey-body.open { display: flex; }
    .apikey-input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: monospace; font-size: .8rem; color: var(--ink); background: white; outline: none; }
    .apikey-input:focus { border-color: var(--blue); }
    .apikey-actions { display: flex; gap: 8px; }
    .apikey-save { flex: 1; padding: 9px; border: none; border-radius: 10px; background: var(--blue); color: white; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .85rem; cursor: pointer; }
    .apikey-clear { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 10px; background: white; color: var(--red); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .82rem; cursor: pointer; }
    .apikey-hint { font-size: .72rem; color: var(--ink-light); font-weight: 600; }
    .apikey-hint a { color: var(--blue); }

    .guide-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px; border: none; border-radius: var(--radius); background: linear-gradient(135deg, #6e2510, #c0392b, #6e2510); color: var(--parchment); font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; cursor: pointer; box-shadow: 0 6px 20px rgba(192,57,43,.4); transition: transform .15s, box-shadow .15s; position: relative; overflow: hidden; }
    .guide-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(192,57,43,.5); }
    .guide-btn:active { transform: translateY(1px); }
    .guide-btn:disabled { background: #6b7280; box-shadow: none; cursor: not-allowed; transform: none; }
    .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,.25); width: 10px; height: 10px; animation: ripple-anim .6s ease-out forwards; pointer-events: none; }
    @keyframes ripple-anim { to { transform: scale(30); opacity: 0; } }

    .loading-row { display: none; align-items: center; gap: 10px; justify-content: center; color: #c8a96e; font-weight: 700; font-size: .88rem; font-style: italic; }
    .loading-row.visible { display: flex; }
    .dots span { display: inline-block; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; margin: 0 2px; animation: bounce .9s ease-in-out infinite; }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-7px); } }

    .story-card { display: none; background: var(--parchment); border: 2px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.25); animation: pop-in .4s cubic-bezier(.34,1.56,.64,1) forwards; }
    .story-card.visible { display: block; }
    @keyframes pop-in { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .story-header { background: linear-gradient(135deg, #1a0a02, #3d1f08); padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
    .story-avatar { width: 40px; height: 40px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
    .story-meta { flex: 1; }
    .story-guide-name { font-family: 'Playfair Display', serif; font-size: .95rem; color: var(--gold); font-weight: 700; }
    .story-site-name { font-size: .75rem; color: #c8a96e; font-weight: 600; margin-top: 2px; }
    .story-badges { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
    .story-dist { font-size: .7rem; background: rgba(212,172,13,.2); border: 1px solid rgba(212,172,13,.4); color: var(--gold); padding: 2px 8px; border-radius: 20px; font-weight: 700; }
    .story-period { font-size: .68rem; background: rgba(192,57,43,.2); border: 1px solid rgba(192,57,43,.4); color: #e8917e; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
    .story-body { padding: 18px 18px 10px; }
    .story-text { font-size: .95rem; line-height: 1.75; color: var(--ink); font-style: italic; }
    .story-footer { display: flex; gap: 8px; padding: 10px 16px 14px; justify-content: flex-end; }
    .tts-btn { display: flex; align-items: center; gap: 5px; padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 10px; background: white; color: var(--blue); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .8rem; cursor: pointer; transition: background .15s; }
    .tts-btn:hover { background: #eaf4fb; }
    .tts-btn.speaking { background: #eaf4fb; border-color: var(--blue); }

    .error-msg { display: none; background: #fdf2f2; border: 2px solid #f5c6c6; border-radius: 12px; padding: 12px 16px; font-size: .85rem; color: var(--red); font-weight: 600; }
    .error-msg.visible { display: block; }
    .footer { text-align: center; font-size: .7rem; color: #8b5e3c; font-weight: 600; letter-spacing: 1px; }
  </style>
</head>
<body>

<div class="header">
  <div class="app-title">🏛 Guide IA</div>
  <div class="app-sub">Votre guide historique de poche</div>
  <div class="compass-wrap">
    <div class="compass"><div class="needle" id="needle"></div></div>
    <span class="compass-label" id="compass-label">CAP</span>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="loc-bar">
      <span style="font-size:1.2rem">📍</span>
      <div class="loc-info">
        <div class="loc-text" id="loc-text">Localisation en cours…</div>
        <div class="loc-coords" id="loc-coords"></div>
      </div>
      <div class="dir-badge" id="dir-badge">🧭 <span id="dir-label">?</span></div>
    </div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot dot-me"></div>Vous êtes ici</div>
      <div class="legend-item"><div class="legend-dot dot-site"></div>Site historique</div>
    </div>
  </div>

  <div class="apikey-section" id="apiKeySection">
    <div class="apikey-header" onclick="toggleApiPanel()">
      <span class="apikey-label">🔑 Clé OpenRouter</span>
      <span class="apikey-status" id="apiKeyStatus">Non configurée</span>
    </div>
    <div class="apikey-body" id="apiKeyBody">
      <input class="apikey-input" id="apiKeyInput" type="password" placeholder="sk-or-v1-…" autocomplete="off" spellcheck="false" />
      <div class="apikey-actions">
        <button class="apikey-save" onclick="saveApiKey()">💾 Sauvegarder</button>
        <button class="apikey-clear" onclick="clearApiKey()">🗑</button>
      </div>
      <span class="apikey-hint">Clé gratuite sur <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></span>
    </div>
  </div>

  <button class="guide-btn" id="guideBtn" disabled>
    <span style="font-size:1.4rem">🏛</span> Guide-moi !
  </button>

  <div class="loading-row" id="loadingRow">
    <span>Le guide consulte ses archives</span>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <div class="story-card" id="storyCard">
    <div class="story-header">
      <div class="story-avatar">🎩</div>
      <div class="story-meta">
        <div class="story-guide-name">Votre Guide</div>
        <div class="story-site-name" id="storySiteName">—</div>
      </div>
      <div class="story-badges">
        <div class="story-dist" id="storyDist"></div>
        <div class="story-period" id="storyPeriod"></div>
      </div>
    </div>
    <div class="story-body">
      <div class="story-text" id="storyText"></div>
    </div>
    <div class="story-footer">
      <button class="tts-btn" id="ttsBtn" onclick="toggleSpeak()">🔊 Écouter</button>
      <button class="tts-btn" onclick="stopSpeak()">⏹ Stop</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="footer">v0.0.6 · OpenRouter · Leaflet · GPS</div>
</div>

<script>
let userLat = null, userLon = null, heading = null;
let callCount = 0, currentUtterance = null;
const seenPlaces = new Set();
let map, markerMe, markerSite, lineSite;

// MAP
function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  map.setView([46.5, 2.5], 5);
}

function makeIcon(emoji, color) {
  return L.divIcon({
    html: '<div style="background:' + color + ';width:32px;height:32px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:.95rem;">' + emoji + '</div>',
    className: '', iconSize: [32,32], iconAnchor: [16,16], popupAnchor: [0,-20]
  });
}

function updateMyMarker() {
  if (!map || userLat === null) return;
  const pos = [userLat, userLon];
  if (!markerMe) {
    markerMe = L.marker(pos, { icon: makeIcon('🔵','#1a5276'), zIndexOffset: 1000 }).addTo(map).bindPopup('<b>Vous êtes ici</b>');
    map.setView(pos, 15);
  } else { markerMe.setLatLng(pos); }
}

function showSiteOnMap(lat, lon, name) {
  if (!map) return;
  if (markerSite) { map.removeLayer(markerSite); markerSite = null; }
  if (lineSite)   { map.removeLayer(lineSite);   lineSite = null; }
  markerSite = L.marker([lat,lon], { icon: makeIcon('🔴','#c0392b') }).addTo(map).bindPopup('<b>' + name + '</b>').openPopup();
  if (userLat !== null) {
    lineSite = L.polyline([[userLat,userLon],[lat,lon]], { color:'#c0392b', weight:2.5, dashArray:'7,9', opacity:.65 }).addTo(map);
    map.fitBounds([[userLat,userLon],[lat,lon]], { padding:[44,44] });
  } else { map.setView([lat,lon], 15); }
}

// GEO
function initGeo() {
  if (!navigator.geolocation) { setLocText('GPS non disponible',''); refreshGuideBtn(); return; }
  navigator.geolocation.watchPosition(
    function(pos) {
      userLat = pos.coords.latitude; userLon = pos.coords.longitude;
      if (pos.coords.heading != null) heading = pos.coords.heading;
      setLocText('📍 Position trouvée', userLat.toFixed(4) + ', ' + userLon.toFixed(4));
      updateMyMarker(); updateCompass(heading); updateDirBadge(heading); refreshGuideBtn();
    },
    function() { setLocText('GPS indisponible',''); refreshGuideBtn(); },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}
function setLocText(t,c) { document.getElementById('loc-text').textContent = t; document.getElementById('loc-coords').textContent = c; }

// COMPASS
function headingLabel(d) {
  if (d == null) return '?';
  return ['N','NE','E','SE','S','SO','O','NO'][Math.round(d/45)%8];
}
function updateCompass(d) {
  if (d == null) return;
  document.getElementById('needle').style.transform = 'rotate('+d+'deg)';
  document.getElementById('compass-label').textContent = headingLabel(d);
}
function updateDirBadge(d) {
  var b = document.getElementById('dir-badge');
  if (d == null) { b.style.display='none'; return; }
  b.style.display='inline-flex';
  document.getElementById('dir-label').textContent = headingLabel(d)+' '+Math.round(d)+'°';
}

if (window.DeviceOrientationEvent) {
  var orientHandler = function(e) {
    var h = e.webkitCompassHeading != null ? e.webkitCompassHeading : e.alpha;
    if (h != null) { heading = h; updateCompass(h); updateDirBadge(h); }
  };
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('guideBtn').addEventListener('click', function() {
      DeviceOrientationEvent.requestPermission().then(function(s) {
        if (s==='granted') window.addEventListener('deviceorientation', orientHandler);
      }).catch(function(){});
    }, { once: true });
  } else { window.addEventListener('deviceorientation', orientHandler); }
}

// API KEY
var LS_KEY = 'guideIA_openrouter_key';
function getApiKey() { return localStorage.getItem(LS_KEY) || ''; }
function saveApiKey() {
  var v = document.getElementById('apiKeyInput').value.trim();
  if (!v) { alert('Entre une clé valide !'); return; }
  localStorage.setItem(LS_KEY, v);
  updateApiKeyUI(true);
  document.getElementById('apiKeyBody').classList.remove('open');
  refreshGuideBtn();
}
function clearApiKey() {
  localStorage.removeItem(LS_KEY);
  document.getElementById('apiKeyInput').value = '';
  updateApiKeyUI(false); refreshGuideBtn();
}
function toggleApiPanel() {
  var b = document.getElementById('apiKeyBody');
  b.classList.toggle('open');
  if (b.classList.contains('open')) { document.getElementById('apiKeyInput').value = getApiKey(); document.getElementById('apiKeyInput').focus(); }
}
function updateApiKeyUI(has) {
  document.getElementById('apiKeySection').classList.toggle('saved', has);
  var s = document.getElementById('apiKeyStatus');
  s.classList.toggle('ok', has);
  s.textContent = has ? '✓ Configurée' : 'Non configurée';
}
function refreshGuideBtn() { document.getElementById('guideBtn').disabled = !getApiKey(); }
(function() {
  if (getApiKey()) updateApiKeyUI(true);
  else { updateApiKeyUI(false); document.getElementById('apiKeyBody').classList.add('open'); }
  refreshGuideBtn();
})();

// FETCH
async function callAI(userPrompt, sysPrompt) {
  const apiKey = getApiKey();
  const msgs = [];
  if (sysPrompt) msgs.push({ role: "system", content: sysPrompt });
  msgs.push({ role: "user", content: userPrompt });
  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey,
      "HTTP-Referer": window.location.href,
      "X-Title": "Guide IA"
    },
    body: JSON.stringify({ model: "openrouter/free", messages: msgs, max_tokens: 600, temperature: 0.8 })
  });
  if (res.status === 401 || res.status === 403) throw new Error("Clé API invalide. Vérifie sur openrouter.ai");
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error((e && e.error && e.error.message) || "Erreur HTTP " + res.status);
  }
  const data = await res.json();
  return ((data.choices || [])[0] || {}).message && data.choices[0].message.content
    ? data.choices[0].message.content.trim() : "";
}

async function nominatimSearch(query, lat, lon) {
  const bbox = (lon-0.05)+","+(lat+0.05)+","+(lon+0.05)+","+(lat-0.05);
  const url = "https://nominatim.openstreetmap.org/search?q="
    + encodeURIComponent(query)
    + "&format=json&limit=5&bounded=0&viewbox=" + bbox;
  const res = await fetch(url, { headers: { "Accept-Language": "fr", "User-Agent": "GuideIA/1.0" } });
  if (!res.ok) return null;
  const data = await res.json();
  if (!data.length) return null;
  data.sort((a,b) => {
    const da = Math.hypot(parseFloat(a.lat)-lat, parseFloat(a.lon)-lon);
    const db = Math.hypot(parseFloat(b.lat)-lat, parseFloat(b.lon)-lon);
    return da - db;
  });
  return data[0];
}

async function overpassNearby(lat, lon, radius) {
  const query = "[out:json][timeout:12];(node[\"historic\"](around:"+radius+","+lat+","+lon+");way[\"historic\"](around:"+radius+","+lat+","+lon+");node[\"tourism\"=\"museum\"](around:"+radius+","+lat+","+lon+");way[\"tourism\"=\"museum\"](around:"+radius+","+lat+","+lon+"););out center 30;";
  const res = await fetch("https://overpass-api.de/api/interpreter", { method:"POST", body:query });
  if (!res.ok) return [];
  const data = await res.json();
  return (data.elements||[]).map(el => {
    const elLat = el.lat || (el.center && el.center.lat);
    const elLon = el.lon || (el.center && el.center.lon);
    const name = el.tags && (el.tags.name || el.tags["name:fr"]);
    if (!name || !elLat || !elLon) return null;
    return {
      name,
      lat: parseFloat(elLat),
      lon: parseFloat(elLon),
      dist: Math.round(Math.hypot(parseFloat(elLat)-lat, parseFloat(elLon)-lon) * 111320)
    };
  }).filter(Boolean).sort((a,b) => a.dist - b.dist);
}

async function fetchGuide() {
  if (!getApiKey()) throw new Error("Configure d'abord ta cle OpenRouter");
  callCount++;

  const hasGps = userLat !== null && userLon !== null;
  const lat0 = hasGps ? userLat : 48.8534;
  const lon0 = hasGps ? userLon : 2.3488;
  const dirPart = heading != null ? " Je marche cap " + headingLabel(heading) + "." : "";

  // ETAPE 1 : vrais lieux OSM via Overpass
  let lieu, lat, lon, dist_m = 0;
  let candidates = [];
  try { candidates = await overpassNearby(lat0, lon0, 500); }
  catch(e) { console.warn("Overpass:", e); }

  if (candidates.length > 0) {
    const fresh = candidates.filter(c => !seenPlaces.has(c.name));
    const pool  = fresh.length > 0 ? fresh : candidates;
    const pick  = pool[Math.floor(Math.random() * Math.min(5, pool.length))];
    lieu   = pick.name;
    lat    = pick.lat;
    lon    = pick.lon;
    dist_m = pick.dist;
    seenPlaces.add(lieu);
    console.log("OSM:", lieu, lat, lon, dist_m+"m");
  } else {
    // Fallback: IA donne un nom, Nominatim geocode
    const nameRaw = await callAI(
      "Cite UNIQUEMENT le nom d'un monument ou lieu historique reel situe pres de lat="
      + lat0.toFixed(5) + " lon=" + lon0.toFixed(5)
      + ". Reponds avec seulement le nom, rien d'autre. Appel n." + callCount + "."
    );
    lieu = nameRaw.trim().replace(/^["']+|["'.]+$/g, "").split("\n")[0];
    const osm = await nominatimSearch(lieu, lat0, lon0);
    lat  = osm ? parseFloat(osm.lat) : lat0;
    lon  = osm ? parseFloat(osm.lon) : lon0;
    dist_m = Math.round(Math.hypot(lat-lat0, lon-lon0)*111320);
    seenPlaces.add(lieu);
    console.log("Nominatim:", lieu, lat, lon);
  }

  // ETAPE 2 : narration IA sur ce lieu precis avec coords reelles
  const prompt =
    "Tu es un guide historique passionne sur place.\n" +
    "Le visiteur est a lat=" + lat0.toFixed(5) + " lon=" + lon0.toFixed(5) + "." + dirPart + "\n" +
    "Parle-lui maintenant de : \"" + lieu + "\" (a environ " + dist_m + " m de lui).\n" +
    "Commence par une phrase indiquant la direction et la distance. Puis raconte l'histoire en 4-5 phrases vivantes en francais.";

  const recit = await callAI(prompt);
  if (!recit) throw new Error("Reponse vide.");

  return { lieu, recit, lat, lon };
}

// BUTTON
document.getElementById('guideBtn').addEventListener('click', async function(e) {
  var rect = this.getBoundingClientRect();
  var r = document.createElement('span');
  r.className = 'ripple';
  r.style.left = (e.clientX - rect.left - 5) + 'px';
  r.style.top  = (e.clientY - rect.top  - 5) + 'px';
  this.appendChild(r);
  setTimeout(function(){r.remove();}, 700);

  stopSpeak();
  document.getElementById('storyCard').classList.remove('visible');
  document.getElementById('errorMsg').classList.remove('visible');
  document.getElementById('loadingRow').classList.add('visible');
  this.disabled = true;

  try {
    var d = await fetchGuide();
    document.getElementById('storySiteName').textContent = d.lieu || '—';
    document.getElementById('storyDist').textContent = '';
    document.getElementById('storyPeriod').textContent = '';
    document.getElementById('storyText').textContent = d.recit || '—';
    document.getElementById('storyCard').classList.add('visible');
    if (d.lat && d.lon) showSiteOnMap(d.lat, d.lon, d.lieu || 'Site historique');
    autoSpeak(d.recit || '');
  } catch(err) {
    var msg = document.getElementById('errorMsg');
    msg.textContent = '😕 ' + err.message;
    msg.classList.add('visible');
  } finally {
    document.getElementById('loadingRow').classList.remove('visible');
    this.disabled = false;
  }
});

// TTS
function autoSpeak(text) {
  if (!window.speechSynthesis || !text) return;
  stopSpeak();
  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = 'fr-FR';
  currentUtterance.rate = 0.88;
  currentUtterance.onstart = function() { document.getElementById('ttsBtn').classList.add('speaking'); document.getElementById('ttsBtn').textContent = '🔊 Lecture…'; };
  currentUtterance.onend = currentUtterance.onerror = function() { document.getElementById('ttsBtn').classList.remove('speaking'); document.getElementById('ttsBtn').textContent = '🔊 Écouter'; };
  speechSynthesis.speak(currentUtterance);
}
function toggleSpeak() { if (speechSynthesis.speaking) { stopSpeak(); return; } autoSpeak(document.getElementById('storyText').textContent); }
function stopSpeak() { if (window.speechSynthesis) speechSynthesis.cancel(); var b = document.getElementById('ttsBtn'); if (b) { b.classList.remove('speaking'); b.textContent = '🔊 Écouter'; } }

// INIT
initMap();
initGeo();
</script>
</body>
